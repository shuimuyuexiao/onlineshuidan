<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>水单生成器</title>
    <link rel="stylesheet" href="styles.css?v=20260714" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="生成器操作">
        <div>
          <h1>水单生成器</h1>
          <p>根据公司真实出款记录生成付款确认文件，支持图片和 PDF 导出。</p>
        </div>
        <div class="actions">
          <button type="button" class="secondary" id="resetDemoBtn">恢复默认</button>
          <button type="button" class="secondary" id="newIdBtn">重新编号</button>
          <button type="button" class="secondary" id="timeNowBtn">当前时间</button>
          <button type="button" id="exportPngBtn">导出图片</button>
          <button type="button" id="exportPdfBtn">导出 PDF</button>
        </div>
      </section>

      <section class="workspace">
        <form class="panel controls" id="receiptForm">
          <div class="form-section">
            <div class="section-title">
              <h2>模板与编号</h2>
            </div>
            <div class="field-grid two">
              <label>
                <span>凭证语言</span>
                <select name="language">
                  <option value="zh">中文</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label>
                <span>水单主体</span>
                <select name="receiptStyle">
                  <option value="gc">1 GC模版</option>
                  <option value="jialian">2 嘉联模版</option>
                  <option value="uq">3 UQ模版</option>
                  <option value="py">4 PY模版</option>
                </select>
              </label>
            </div>
            <label>
              <span id="documentIdLabel">凭证编号</span>
              <div class="input-action">
                <input name="documentId" maxlength="40" />
                <button type="button" class="secondary mini" id="randomDocumentIdBtn">随机</button>
              </div>
            </label>
            <div class="field-grid three">
              <label>
                <span>生成日期</span>
                <input name="documentDate" type="date" />
              </label>
              <label>
                <span>创建时间</span>
                <input name="startedAt" type="datetime-local" step="1" />
              </label>
              <label>
                <span>完成时间</span>
                <input name="completedAt" type="datetime-local" step="1" />
              </label>
            </div>
            <div class="field-grid two" data-templates="uq">
              <label>
                <span>出款日期</span>
                <input name="payoutDate" type="date" />
              </label>
              <label>
                <span>完成日期</span>
                <input name="completeDate" type="date" />
              </label>
            </div>
          </div>

          <div class="form-section">
            <div class="section-title">
              <h2>交易金额</h2>
            </div>
            <div class="field-grid three">
              <label>
                <span id="amountLabel">付款金额</span>
                <input name="amount" type="number" min="0" step="0.01" />
              </label>
              <label>
                <span>付款币种</span>
                <select name="payCurrency">
                  <option>CNH</option>
                  <option>USD</option>
                  <option>HKD</option>
                  <option>EUR</option>
                </select>
              </label>
              <label>
                <span>收款币种</span>
                <select name="receiveCurrency">
                  <option>CNH</option>
                  <option>USD</option>
                  <option>HKD</option>
                  <option>EUR</option>
                </select>
              </label>
            </div>
            <div class="field-grid three">
              <label>
                <span>收款金额</span>
                <input name="receiveAmount" type="number" min="0" step="0.01" />
              </label>
              <label>
                <span>手续费</span>
                <input name="fee" type="number" min="0" step="0.01" />
              </label>
              <label>
                <span>手续费币种</span>
                <select name="feeCurrency">
                  <option>CNH</option>
                  <option>USD</option>
                  <option>HKD</option>
                  <option>EUR</option>
                </select>
              </label>
            </div>
            <div class="field-grid three">
              <label>
                <span>支付方式</span>
                <select name="paymentMethod">
                  <option>SWIFT</option>
                  <option>CHATS</option>
                  <option>FPS</option>
                  <option>Bank Transfer</option>
                  <option>Telegraphic Transfer</option>
                  <option>Wallet Transfer</option>
                </select>
              </label>
              <label>
                <span>付款状态</span>
                <select name="status">
                  <option>处理中</option>
                  <option>已完成</option>
                  <option>待确认</option>
                  <option>已取消</option>
                  <option>Success</option>
                  <option>Pending</option>
                  <option>Processing</option>
                </select>
              </label>
              <label data-templates="jialian">
                <span>汇率</span>
                <input name="exchangeRate" maxlength="20" />
              </label>
            </div>
            <div class="field-grid two">
              <label>
                <span id="purposeLabel">付款原因</span>
                <input name="paymentPurpose" maxlength="100" />
              </label>
              <label>
                <span id="memoLabel">备注/附言</span>
                <input name="memo" maxlength="140" />
              </label>
            </div>
          </div>

          <div class="form-section">
            <div class="section-title">
              <h2>付款方</h2>
            </div>
            <input name="payerName" type="hidden" />
            <label data-templates="gc">
              <span>付款方名称</span>
              <input name="payerNameText" maxlength="120" />
            </label>
            <label data-templates="jialian uq py">
              <span>付款公司</span>
              <select name="payerCompanySelect">
                <option>LOCAL OPTION TECH LIMITED</option>
                <option>NO FIVE CONSOLIDATE IMPORT & EXPORT CO., LIMITED</option>
                <option>MONOLITH TECHNOLOGY LIMITED</option>
                <option>STARPORT TRADING LIMITED</option>
                <option>CLICKBRIDGE TECHNOLOGY LIMITED</option>
                <option>MAYGOGH TRADING CO., LIMITED</option>
              </select>
            </label>
            <label data-templates="uq">
              <span>付款方地址</span>
              <textarea name="payerAddress" rows="3" maxlength="220"></textarea>
            </label>
            <div class="field-grid two" data-templates="uq">
              <label>
                <span>主体类型</span>
                <select name="payerEntityType">
                  <option>COMPANY</option>
                  <option>INDIVIDUAL</option>
                </select>
              </label>
              <label>
                <span>Payout Reference</span>
                <input name="payerReference" maxlength="120" />
              </label>
            </div>
            <div class="field-grid two" data-templates="gc">
              <label>
                <span>编号标签</span>
                <select name="payerIdLabel">
                  <option>公司ID</option>
                  <option>客户编号</option>
                  <option>账户号码</option>
                </select>
              </label>
              <label>
                <span>编号</span>
                <div class="input-action">
                  <input name="payerId" maxlength="40" />
                  <button type="button" class="secondary mini" id="randomPayerIdBtn">随机</button>
                </div>
              </label>
            </div>
            <label data-templates="gc">
              <span>付款参考号</span>
              <input name="payerRef" maxlength="40" readonly />
            </label>
          </div>

          <div class="form-section">
            <div class="section-title">
              <h2>收款方</h2>
            </div>
            <label>
              <span>收款方名称</span>
              <input name="recipientName" maxlength="130" />
            </label>
            <div class="field-grid two">
              <label>
                <span>银行名称</span>
                <input name="recipientBank" maxlength="140" />
              </label>
              <label>
                <span>银行账号</span>
                <input name="recipientAccount" maxlength="60" />
              </label>
            </div>
            <div class="field-grid two">
              <label>
                <span>SWIFT / Routing</span>
                <input name="recipientSwift" maxlength="60" />
              </label>
            </div>
            <div class="field-grid two" data-templates="gc">
              <label>
                <span>账户标签</span>
                <select name="recipientAccountLabel">
                  <option>账户号码</option>
                  <option>银行账号</option>
                  <option>钱包号码</option>
                  <option>IBAN</option>
                </select>
              </label>
              <label>
                <span>收款方类型</span>
                <select name="recipientType">
                  <option>Individual</option>
                  <option>Company</option>
                </select>
              </label>
            </div>
          </div>
        </form>

        <section class="preview-column" aria-label="水单预览">
          <div class="preview-head">
            <h2>实时预览</h2>
            <span id="saveState">已同步</span>
          </div>
          <article id="previewSurface" class="paper"></article>
        </section>
      </section>
    </main>

    <script src="app.js?v=20260714"></script>
  </body>
</html>
